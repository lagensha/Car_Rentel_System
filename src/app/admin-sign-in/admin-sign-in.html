<div class="admin-auth-container">
  <div class="background-car"></div>
  
  <div class="auth-card">
    <div class="auth-header">
      <div class="shield-logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ffb400" stroke-width="1.5">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <circle cx="12" cy="12" r="3" />
        </svg>
      </div>
      <h2>ADMIN<span>PORTAL</span></h2>
      <p>Secure Fleet Access</p>
    </div>

    <form class="auth-form">
      <div class="input-group">
        <input type="text" placeholder="Access ID" required>
      </div>
      <div class="input-group">
        <input type="password" placeholder="Encryption Key" required>
      </div>
      
      <div class="auth-meta">
        <div class="status-indicator">
          <span class="dot"></span>
          <span>SYSTEM ENCRYPTED</span>
        </div>
        <a href="#">Security Reset</a>
      </div>

      <button class="auth-btn">Authorize Session</button>
    </form>
  </div>
</div>
