<link rel="stylesheet" href="registration.css"> 
<div class="signin-container">
  <div class="signin-visual">
    <div class="overlay-text">
      <h2>Welcome Back to <span>LUXEDRIVE</span></h2>
      <p>Your next journey begins with a single click.</p>
    </div>
  </div>

  <div class="signin-form-section">
    <div class="back-home">
      <a href="#">← Back to Gallery</a>
    </div>

    <div class="form-wrapper">
      <div class="form-header">
        <h1>Sign In</h1>
        <p>Enter your credentials to access your fleet.</p>
      </div>

      <form>
          <div class="input-box">
            <label>Name</label>
            <input type="text" placeholder="Your Name" required>
          </div>

          <div class="input-box">
            <label>Phone Number</label>
            <input type="tel" placeholder="e.g. 123-456-7890" required>
          </div>

        <div class="input-box">
          <label>Email Address</label>
          <input type="email" placeholder="name@luxury.com" required>
        </div>

        <div class="input-box">
          <label>Password</label>
          <input type="password" placeholder="••••••••" required>
        </div>

        <div class="form-options">
          <label><input type="checkbox"> Remember me</label>
          <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn" routerLink="/car-catalog">Unlock Access</button>

        <div class="form-footer">
          <p>Don't have an account? <a href="#">Create Account</a></p>
        </div>
      </form>
    </div>
  </div>
</div>
