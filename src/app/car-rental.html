<link rel="stylesheet" href="car-rental.css">
<div class="rental-container">
	<h1 class="rental-title">Rent a Car</h1>
	<div class="rental-grid">
		<!-- Car Card 1 -->
		<div class="rental-card">
			<img src="" alt="Audi e-tron GT" class="rental-img">
			<div class="rental-details">
				<h2 class="rental-model">e-tron GT</h2>
				<p class="rental-brand">Audi</p>
				<div class="rental-info">
					<span>Electric</span>
					<span>5 Seats</span>
				</div>
				<div class="rental-price">$180/day</div>
			</div>
		</div>
		<!-- Car Card 2 -->
		<div class="rental-card">
			<img src="" alt="Lucid Air" class="rental-img">
			<div class="rental-details">
				<h2 class="rental-model">Air</h2>
				<p class="rental-brand">Lucid</p>
				<div class="rental-info">
					<span>Electric</span>
					<span>5 Seats</span>
				</div>
				<div class="rental-price">$200/day</div>
			</div>
		</div>
		<!-- Car Card 3 -->
		<div class="rental-card">
			<img src="" alt="Mercedes-Benz CLA Electric" class="rental-img">
			<div class="rental-details">
				<h2 class="rental-model">CLA Electric</h2>
				<p class="rental-brand">Mercedes-Benz</p>
				<div class="rental-info">
					<span>Electric</span>
					<span>5 Seats</span>
				</div>
				<div class="rental-price">$210/day</div>
			</div>
		</div>
		<!-- Car Card 4 -->
		<div class="rental-card">
			<img src="" alt="Porsche Taycan" class="rental-img">
			<div class="rental-details">
				<h2 class="rental-model">Taycan</h2>
				<p class="rental-brand">Porsche</p>
				<div class="rental-info">
					<span>Electric</span>
					<span>4 Seats</span>
				</div>
				<div class="rental-price">$230/day</div>
			</div>
		</div>
	</div>
</div>
